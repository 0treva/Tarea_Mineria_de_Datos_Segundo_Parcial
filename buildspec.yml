version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt
  build:
    commands:
      - python -m src.train --data_path data/life_expectancy_data.csv
      - pytest -q
artifacts:
  files:
    - app/**/*
    - src/**/*
    - model/**/*
    - data/**/*
    - requirements.txt
    - Procfile
